[settings]
activate_aggressive = true
experimental = true

[tools]
hk = "latest"
hugo-extended = "latest"
node = "latest"
usage = "latest"
pkl = "latest"
shellcheck = "latest"
shfmt = "latest"
yamllint = "latest"

[hooks]
postinstall = "mise run deps"

[env]
PUBLIC_DIR = "public"

[tasks.deps-install]
alias = "deps"
run = "hugo mod tidy"

[tasks.deps-upgrade]
run = [
	"mise upgrade --bump",
	"hugo mod get -u ./...",
]

[tasks.nuke]
depends = ["clean nuke"]

[tasks.ci]
depends = ["bootstrap", "build", "format"]

[tasks.rebuild]
depends = ["clean", "build"]

[tasks.reset]
depends = ["clean", "run"]
