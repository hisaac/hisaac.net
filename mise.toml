[settings]
activate_aggressive = true
experimental = true

[tools]
hk = "latest"
hugo-extended = "latest"
pkl = "latest"
python = "latest"
shellcheck = "latest"
shfmt = "latest"
usage = "latest"

node = "latest"
"npm:prettier" = "latest"

pipx = "latest"
"pipx:yamllint" = "latest"

[hooks]
postinstall = "mise run bootstrap"

[tasks.bootstrap]
alias = "deps"
run = "hugo mod tidy"

[tasks.upgrade]
run = ["mise upgrade --bump", "mise exec -- hugo mod get -u ./..."]

[tasks.nuke]
depends = ["clean nuke"]

[tasks.ci]
depends = ["build", "format"]

[tasks.rebuild]
depends = ["clean", "build"]

[tasks.reset]
depends = ["clean", "run"]
