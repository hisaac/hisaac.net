[settings]
activate_aggressive = true
experimental = true

[tools]
hugo-extended = "latest"
node = "latest"
usage = "latest"

[env]
PUBLIC_DIR = "public"

[tasks.nuke]
depends = ["clean nuke"]

[tasks.ci]
depends = ["bootstrap", "build", "format"]

[tasks.rebuild]
depends = ["clean", "build"]

[tasks.reset]
depends = ["clean", "run"]
