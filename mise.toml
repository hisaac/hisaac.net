[settings]
activate_aggressive = true
experimental = true
lockfile = true

[tools]
go = "latest"
hk = "latest"
node = "latest"
pipx = "latest"
pkl = "latest"
prettier = "latest"
python = "latest"
shellcheck = "latest"
shfmt = "latest"
usage = "latest"
yamlfmt = "latest"
yamllint = "latest"

# 2026-04-10
# Locking Hugo version to 0.152 — versions 0.153+ have two known bugs:
#   1. webp encoding OOM crash: https://github.com/gohugoio/hugo/issues/14282
#   2. warpc/Dart Sass WASM panic: "call with ID 0 not found" (unreported as of 2026-04-10)
hugo-extended = "0.152"

[hooks]
postinstall = { task = "bootstrap" }

[tasks.bootstrap]
run = "hugo mod tidy"

[tasks.build]
run = "hugo --config hugo.yml --gc"

[tasks.upg]
run = ["mise upgrade --bump", "mise exec -- hugo mod get -u"]

[tasks.nuke]
depends = ["clean nuke"]

[tasks.ci]
depends = ["bootstrap", "build", "format"]

[tasks.rebuild]
depends = ["clean", "build"]

[tasks.reset]
depends = ["clean", "run"]

[tasks.check]
alias = ["chk", "lint"]
run = "hk check --all"

[tasks.fix]
alias = ["format", "fmt"]
run = "hk fix --all"
